<!-- ================================================================
   SAVOUR — LOGIN PAGE (Food photo split layout)
   ================================================================ -->

<div class="login-container">

  <!-- ── LEFT PANEL — real coffee/food photo ── -->
  <div class="login-left">

    <!-- Brand top-left -->
    <div class="brand-name">SAVOUR</div>

    <!-- Tagline bottom-left -->
    <div class="login-tagline">
      Every Bite,<br>A Story
      <em>Manage your cafe with ease</em>
    </div>

  </div>

  <!-- ── RIGHT PANEL — white form ── -->
  <div class="login-right">
    <div class="login-card">

      <!-- Back arrow -->
      <div class="back-arrow" (click)="goLanding()">←</div>

      <h2>Welcome back</h2>
      <p class="login-subtitle">Sign in to your account</p>

      <input type="text"
             placeholder="Email address"
             [(ngModel)]="email"
             name="email">

      <input type="password"
             placeholder="Password"
             [(ngModel)]="password"
             name="password">

      <button type="button"
              class="btn-login"
              (click)="onLogin()">
        Login
      </button>

      <p class="register-link">
        Don't have an account?
        <span (click)="goLogin()">Register</span>
      </p>

    </div>
  </div>

</div>
